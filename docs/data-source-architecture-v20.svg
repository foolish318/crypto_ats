<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">V20 multi-exchange deep-book pipeline</title>
  <desc id="desc">Aligned architecture flow from Binance US, OKX, and Kraken through raw intake, parsing, a venue-specific quality gate, local books, and consumers, with rejected data routed to resynchronization.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M1 1 L11 6 L1 11 Z" fill="#475569"/>
    </marker>
    <marker id="redArrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M1 1 L11 6 L1 11 Z" fill="#be123c"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="#f8fafc"/>
  <text x="64" y="70" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#0f172a">V20 Multi-Exchange Deep-Book Pipeline</text>
  <text x="64" y="104" font-family="Arial, sans-serif" font-size="17" fill="#475569">Transport success is not enough: only sequence-valid, fresh, uncrossed, checksum-valid books can reach consumers.</text>

  <g font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#334155">
    <text x="82" y="162">EXCHANGE SOURCES</text>
    <text x="342" y="162">RAW INTAKE</text>
    <text x="632" y="162">PARSE + BUILD</text>
    <text x="932" y="162">QUALITY BOUNDARY</text>
    <text x="1262" y="162">APPROVED OUTPUT</text>
  </g>

  <g filter="url(#shadow)" font-family="Arial, sans-serif">
    <rect x="64" y="198" width="210" height="112" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
    <text x="84" y="232" font-size="19" font-weight="700" fill="#0f172a">Binance.US</text>
    <text x="84" y="260" font-size="14" fill="#334155">REST depth snapshot</text>
    <text x="84" y="283" font-size="14" fill="#334155">WS diff depth U / u</text>

    <rect x="64" y="352" width="210" height="112" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="84" y="386" font-size="19" font-weight="700" fill="#0f172a">OKX</text>
    <text x="84" y="414" font-size="14" fill="#334155">WS books snapshot</text>
    <text x="84" y="437" font-size="14" fill="#334155">prevSeqId / seqId</text>

    <rect x="64" y="506" width="210" height="112" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
    <text x="84" y="540" font-size="19" font-weight="700" fill="#0f172a">Kraken</text>
    <text x="84" y="568" font-size="14" fill="#334155">WS v2 book snapshot</text>
    <text x="84" y="591" font-size="14" fill="#334155">CRC32 on every update</text>

    <rect x="324" y="274" width="230" height="268" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="348" y="314" font-size="20" font-weight="700" fill="#0f172a">Raw Message Intake</text>
    <text x="348" y="351" font-size="14" fill="#334155">Capture payload unchanged</text>
    <text x="348" y="378" font-size="14" fill="#334155">Record receive timestamp</text>
    <text x="348" y="405" font-size="14" fill="#334155">Keep source + symbol</text>
    <line x1="348" y1="430" x2="530" y2="430" stroke="#d6a443"/>
    <text x="348" y="461" font-size="14" fill="#334155">Probe coverage:</text>
    <text x="348" y="486" font-size="14" font-weight="700" fill="#92400e">2 consecutive messages</text>
    <text x="348" y="511" font-size="13" fill="#64748b">Continuous in production</text>

    <rect x="604" y="274" width="238" height="268" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
    <text x="628" y="314" font-size="20" font-weight="700" fill="#0f172a">Venue Parser</text>
    <text x="628" y="351" font-size="14" fill="#334155">Validate required fields</text>
    <text x="628" y="378" font-size="14" fill="#334155">Preserve decimal text</text>
    <text x="628" y="405" font-size="14" fill="#334155">Apply snapshot + deltas</text>
    <line x1="628" y1="430" x2="818" y2="430" stroke="#cbd5e1"/>
    <text x="628" y="461" font-size="14" fill="#334155">Temporary venue book</text>
    <text x="628" y="486" font-size="14" fill="#334155">Bids descending</text>
    <text x="628" y="511" font-size="14" fill="#334155">Asks ascending</text>

    <rect x="892" y="198" width="292" height="420" rx="8" fill="#ffe4e6" stroke="#e11d48" stroke-width="2"/>
    <text x="918" y="238" font-size="21" font-weight="700" fill="#881337">V20 Quality Gate</text>
    <rect x="918" y="264" width="240" height="60" rx="6" fill="#ffffff" stroke="#fda4af"/>
    <text x="936" y="289" font-size="14" font-weight="700" fill="#0f172a">COMMON</text>
    <text x="936" y="311" font-size="13" fill="#475569">schema, values, order, freshness</text>
    <rect x="918" y="342" width="240" height="60" rx="6" fill="#e0f2fe" stroke="#7dd3fc"/>
    <text x="936" y="367" font-size="14" font-weight="700" fill="#075985">BINANCE.US</text>
    <text x="936" y="389" font-size="13" fill="#475569">snapshot bridge + U/u continuity</text>
    <rect x="918" y="420" width="240" height="60" rx="6" fill="#dcfce7" stroke="#86efac"/>
    <text x="936" y="445" font-size="14" font-weight="700" fill="#166534">OKX</text>
    <text x="936" y="467" font-size="13" fill="#475569">prevSeqId equals prior seqId</text>
    <rect x="918" y="498" width="240" height="60" rx="6" fill="#ede9fe" stroke="#c4b5fd"/>
    <text x="936" y="523" font-size="14" font-weight="700" fill="#5b21b6">KRAKEN</text>
    <text x="936" y="545" font-size="13" fill="#475569">top-10 CRC32 after each update</text>
    <text x="918" y="589" font-size="14" font-weight="700" fill="#881337">Any failed check rejects the book</text>

    <rect x="1234" y="218" width="292" height="164" rx="8" fill="#ccfbf1" stroke="#0f766e" stroke-width="2"/>
    <text x="1260" y="258" font-size="21" font-weight="700" fill="#134e4a">ACCEPT</text>
    <text x="1260" y="291" font-size="14" fill="#334155">qualityAccepted = true</text>
    <text x="1260" y="318" font-size="14" fill="#334155">Publish venue-local book</text>
    <text x="1260" y="345" font-size="14" fill="#334155">Allow strategy consumption</text>

    <rect x="1234" y="438" width="292" height="164" rx="8" fill="#fff1f2" stroke="#be123c" stroke-width="2"/>
    <text x="1260" y="478" font-size="21" font-weight="700" fill="#9f1239">REJECT</text>
    <text x="1260" y="511" font-size="14" fill="#334155">qualityAccepted = false</text>
    <text x="1260" y="538" font-size="14" fill="#334155">Suppress downstream publish</text>
    <text x="1260" y="565" font-size="14" fill="#334155">Reconnect / snapshot resync</text>
  </g>

  <g fill="none" stroke="#475569" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)">
    <path d="M274 254 H300 V356 H324"/>
    <path d="M274 408 H324"/>
    <path d="M274 562 H300 V460 H324"/>
    <path d="M554 408 H604"/>
    <path d="M842 408 H892"/>
    <path d="M1184 326 H1234"/>
  </g>
  <path d="M1184 520 H1234" fill="none" stroke="#be123c" stroke-width="3" stroke-linecap="round" marker-end="url(#redArrow)"/>

  <rect x="64" y="690" width="1462" height="126" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="90" y="728" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#0f172a">Downstream contract</text>
  <text x="90" y="760" font-family="Arial, sans-serif" font-size="14" fill="#475569">Strategies see normalized, venue-specific local books only after the quality gate has approved them.</text>
  <text x="90" y="788" font-family="Arial, sans-serif" font-size="14" fill="#475569">Transport health and market-data health remain separate, so a connected but corrupt or stale feed cannot appear LIVE.</text>
</svg>
