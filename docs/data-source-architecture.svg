<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1080" viewBox="0 0 1800 1080">
<defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10 Z" fill="#475569"/></marker></defs>
<rect width="1800" height="1080" fill="#f8fafc"/>
<text x="56" y="78" font-family="Arial, sans-serif" font-size="36" font-weight="700" fill="#0f172a">Crypto ATS Data Module - Reference-Inspired Layout</text>
<text x="56" y="108" font-family="Arial, sans-serif" font-size="17" font-weight="400" fill="#475569">Connector/data-client/data-engine/cache/replay patterns adapted from mature open-source trading frameworks.</text>
<rect x="56" y="128" width="520" height="98" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="74" y="164" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">Hummingbot pattern</text>
<text x="74" y="185" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#475569">Connector owns order-book data source, order-book tracker, user stream, auth, order tracker.</text>
<text x="74" y="203" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#475569">We copy: connector + order-book data source + tracker separation.</text>
<rect x="640" y="128" width="520" height="98" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="658" y="164" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">NautilusTrader pattern</text>
<text x="658" y="185" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#475569">Adapters translate venue APIs into normalized domain events.</text>
<text x="658" y="203" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#475569">DataEngine writes cache first, then publishes to strategies through a bus.</text>
<rect x="1224" y="128" width="520" height="98" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<text x="1242" y="164" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">XChange / CCXT pattern</text>
<text x="1242" y="185" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#475569">Provide a unified API facade over many exchanges.</text>
<text x="1242" y="203" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#475569">We copy: one interface, exchange-specific implementations behind it.</text>
<rect x="56" y="260" width="220" height="44" rx="10" fill="#e0f2fe" stroke="#0284c7" stroke-width="1"/>
<text x="74" y="289" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">External Sources</text>
<rect x="326" y="260" width="220" height="44" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
<text x="344" y="289" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">Venue Adapter</text>
<rect x="596" y="260" width="220" height="44" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
<text x="614" y="289" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">Data Intake</text>
<rect x="866" y="260" width="220" height="44" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="1"/>
<text x="884" y="289" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">Data Engine</text>
<rect x="1136" y="260" width="220" height="44" rx="10" fill="#ffe4e6" stroke="#e11d48" stroke-width="1"/>
<text x="1154" y="289" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">Book State</text>
<rect x="1406" y="260" width="220" height="44" rx="10" fill="#ccfbf1" stroke="#0f766e" stroke-width="1"/>
<text x="1424" y="289" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">Consumers</text>
<rect x="56" y="340" width="220" height="112" rx="14" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
<text x="76" y="381" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Direct Exchanges</text>
<text x="76" y="403" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#334155">Binance.US / OKX / Kraken</text>
<text x="76" y="421" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#334155">REST + WebSocket now</text>
<text x="76" y="439" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#334155">FIX later where available</text>
<rect x="56" y="520" width="220" height="92" rx="14" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
<text x="76" y="561" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Third-party Data</text>
<text x="76" y="583" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#334155">CoinAPI / dxFeed</text>
<text x="76" y="601" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#334155">normalized or FIX feeds</text>
<rect x="56" y="700" width="220" height="92" rx="14" fill="#fae8ff" stroke="#a21caf" stroke-width="2"/>
<text x="76" y="741" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Replay Store</text>
<text x="76" y="763" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#334155">local JSONL / binary later</text>
<text x="76" y="781" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#334155">repeatable benchmark input</text>
<rect x="326" y="330" width="220" height="78" rx="14" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
<text x="346" y="371" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">InstrumentProvider</text>
<text x="346" y="393" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#334155">symbols, tick size, lot size</text>
<rect x="326" y="450" width="220" height="96" rx="14" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
<text x="346" y="491" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">MarketDataConnector</text>
<text x="346" y="513" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#334155">one interface per venue</text>
<text x="346" y="531" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#334155">status, subscribe, snapshot</text>
<rect x="326" y="590" width="220" height="92" rx="14" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
<text x="346" y="631" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">MarketDataClient</text>
<text x="346" y="653" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#334155">public feed lifecycle</text>
<text x="346" y="671" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#334155">reconnect / heartbeat</text>
<rect x="596" y="330" width="220" height="92" rx="14" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
<text x="616" y="371" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Transport Clients</text>
<text x="616" y="393" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#334155">REST / WebSocket / FIX</text>
<text x="616" y="411" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#334155">rate limits, timeout</text>
<rect x="596" y="470" width="220" height="92" rx="14" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
<text x="616" y="511" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">RawInboundMessage</text>
<text x="616" y="533" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#334155">raw payload + receive time</text>
<text x="616" y="551" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#334155">source/channel/sequence</text>
<rect x="596" y="610" width="220" height="92" rx="14" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
<text x="616" y="651" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Parser / Normalizer</text>
<text x="616" y="673" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#334155">venue JSON/FIX parser</text>
<text x="616" y="691" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#334155">canonical events</text>
<rect x="866" y="330" width="220" height="92" rx="14" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
<text x="886" y="371" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">MarketDataEngine</text>
<text x="886" y="393" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#334155">single ingestion boundary</text>
<text x="886" y="411" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#334155">cache then publish</text>
<rect x="866" y="470" width="220" height="92" rx="14" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
<text x="886" y="511" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">MarketDataCache</text>
<text x="886" y="533" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#334155">latest quote/book state</text>
<text x="886" y="551" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#334155">fast strategy reads</text>
<rect x="866" y="610" width="220" height="92" rx="14" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
<text x="886" y="651" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">MarketDataEventBus</text>
<text x="886" y="673" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#334155">fan-out to processors</text>
<text x="886" y="691" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#334155">strategy subscriptions</text>
<rect x="866" y="750" width="220" height="82" rx="14" fill="#fae8ff" stroke="#a21caf" stroke-width="2"/>
<text x="886" y="791" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Recorder</text>
<text x="886" y="813" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#334155">persist raw/normalized</text>
<text x="886" y="831" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#334155">feeds replay</text>
<rect x="1136" y="330" width="220" height="92" rx="14" fill="#ffe4e6" stroke="#e11d48" stroke-width="2"/>
