<text x="1426" y="541" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Strategy Pipeline</text>
<text x="1426" y="563" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#334155">spread, top5/top10 depth</text>
