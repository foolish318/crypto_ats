<text x="82" y="931" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">Design rule after refactor</text>
<text x="82" y="956" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#475569">Strategy code consumes normalized events, cache, and local books. It should not know whether input came from REST, WebSocket, FIX, third-party provider, or replay.</text>
<text x="82" y="980" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#475569">Replay is a first-class source so live trading, debugging, and benchmarks can share the same downstream pipeline.</text>
