<text x="1156" y="411" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#334155">resync policy</text>
<rect x="1136" y="470" width="220" height="92" rx="14" fill="#ffe4e6" stroke="#e11d48" stroke-width="2"/>
<text x="1156" y="511" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">BookSequencer</text>
<text x="1156" y="533" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#334155">gap, duplicate, stale</text>
<text x="1156" y="551" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#334155">checksum when available</text>
<rect x="1136" y="610" width="220" height="102" rx="14" fill="#ffe4e6" stroke="#e11d48" stroke-width="2"/>
<text x="1156" y="651" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">LocalOrderBooks</text>
<text x="1156" y="673" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#334155">one book per venue + symbol</text>
<text x="1156" y="691" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#334155">Binance != OKX != Kraken</text>
<rect x="1136" y="760" width="220" height="72" rx="14" fill="#ffe4e6" stroke="#e11d48" stroke-width="2"/>
<text x="1156" y="801" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">SymbolMapper</text>
<text x="1156" y="823" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#334155">venue symbol -&gt; canonical</text>
<rect x="1406" y="330" width="250" height="92" rx="14" fill="#ccfbf1" stroke="#0f766e" stroke-width="2"/>
<text x="1426" y="371" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">CrossExchangeMarketView</text>
<text x="1426" y="393" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#334155">compare venues after each</text>
<text x="1426" y="411" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#334155">book is internally valid</text>
